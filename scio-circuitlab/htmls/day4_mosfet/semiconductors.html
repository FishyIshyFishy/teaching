<title>Charge in Solids</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
  }
  :root[data-theme="light"] {
    --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap {
    background: var(--bg); color: var(--ink); font-family: var(--sans);
    min-height: 100vh; padding: clamp(14px, 2.4vw, 34px);
    -webkit-font-smoothing: antialiased;
  }
  .shell { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .26em; text-transform: uppercase; color: var(--muted); }

  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 3px; }
  .seg button {
    font-family: var(--mono); font-size: .78rem; letter-spacing: .09em; text-transform: uppercase;
    color: var(--muted); background: transparent; border: 0; padding: 8px 16px; border-radius: 6px; cursor: pointer;
  }
  .seg button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); }
  .seg.small button { padding: 6px 12px; font-size: .72rem; }

  .stage {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  canvas { display: block; width: 100%; height: clamp(360px, 56vw, 520px); }

  .legend { display: flex; flex-wrap: wrap; gap: 8px 20px; font-family: var(--mono); font-size: .72rem; color: var(--muted); padding: 0 2px; }
  .chip { display: inline-flex; align-items: center; gap: 8px; }
  .chip b { color: var(--ink); font-weight: 600; min-width: 1ch; }
  .mk { width: 13px; height: 13px; border-radius: 50%; display: inline-block; }
  .mk.e { background: var(--sig-c); box-shadow: 0 0 7px var(--sig-c); }
  .mk.h { background: transparent; border: 2px solid var(--sig-r); }
  .mk.ion { background: transparent; border: 2px solid var(--sig-in); position: relative; }
  .mk.locked { width: 9px; height: 9px; background: var(--muted); opacity: .7; }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 16px 26px; padding: 2px; }
  .btn {
    font-family: var(--mono); font-size: .82rem; letter-spacing: .04em;
    color: var(--ink); background: var(--panel); border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 9px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .btn.on .dot { background: var(--sig-in); box-shadow: 0 0 9px var(--sig-in); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }

  .ctrl { display: flex; flex-direction: column; gap: 7px; min-width: 150px; flex: 1 1 160px; max-width: 300px; }
  .ctrl .lab { display: flex; justify-content: space-between; font-family: var(--mono); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 22px; background: transparent; cursor: pointer; margin: 0; }
  input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 3px; background: var(--border); }
  input[type="range"]::-moz-range-track { height: 4px; border-radius: 3px; background: var(--border); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; margin-top: -6px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); }

  .hide { display: none !important; }
  button:focus-visible, input:focus-visible, .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="bar">
      <span class="eyebrow">Charge in solids</span>
      <div class="seg" role="group" aria-label="Material">
        <button id="mat-ins" aria-pressed="false">Insulator</button>
        <button id="mat-semi" aria-pressed="true">Semiconductor</button>
        <button id="mat-cond" aria-pressed="false">Conductor</button>
      </div>
    </div>

    <div class="stage"><canvas id="scene" aria-label="A crystal lattice of atoms: locked bonding electrons that only jiggle, plus free electrons and holes that roam"></canvas></div>

    <div class="legend">
      <span class="chip"><span class="mk e"></span>free electron <b id="cnt-e">0</b></span>
      <span class="chip"><span class="mk h"></span>hole <b id="cnt-h">0</b></span>
      <span class="chip" id="chip-locked"><span class="mk locked"></span>locked electron (stuck)</span>
      <span class="chip hide" id="chip-ion"><span class="mk ion"></span>fixed dopant ion <b id="cnt-ion">0</b></span>
    </div>

    <div class="deck">
      <div class="ctrl">
        <div class="lab"><span>cold</span><span>temperature</span><span>hot</span></div>
        <input type="range" id="temp-slider" min="0" max="1" step="0.001" value="0.28" aria-label="Temperature">
      </div>

      <div class="seg small hide" id="dope-ctrl" role="group" aria-label="Doping">
        <button id="dope-p" aria-pressed="false">p-type</button>
        <button id="dope-i" aria-pressed="true">pure</button>
        <button id="dope-n" aria-pressed="false">n-type</button>
      </div>

      <div class="ctrl hide" id="level-ctrl">
        <div class="lab"><span>light</span><span>doping</span><span>heavy</span></div>
        <input type="range" id="level-slider" min="0" max="1" step="0.001" value="0.5" aria-label="Doping level">
      </div>

      <button class="btn" id="volt-btn"><span class="dot"></span><span id="volt-label">Apply voltage</span></button>
      <button class="btn primary" id="play-btn">Pause</button>
      <button class="btn" id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const rand = (a, b) => a + Math.random() * (b - a);
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const motionScale = reduceMotion ? 0.4 : 1;
  const cssv = getComputedStyle(document.documentElement);
  const mono = cssv.getPropertyValue("--mono");

  // theme-aware colours
  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"),
      border: g("--border"), sin: g("--sig-in"), sc: g("--sig-c"), sr: g("--sig-r"),
      accent: g("--accent"), bg: g("--bg"), panel: g("--panel") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  const S = {
    material: "semiconductor", temp: 0.28, dopeType: "i", level: 0.5,
    field: false, running: true, t: 0, popTimer: 0,
  };
  const maxDopants = 6;

  const electrons = [];   // {x,y,vx,vy}
  const holes = [];
  const flashes = [];     // {x,y,age}

  // ---- lattice geometry ----
  let atoms = [], bonds = [], dopeOrder = [], reg = { x0: 0, x1: 1, y0: 0, y1: 1 };
  const hash = (i) => { const s = Math.sin(i * 127.1 + 4.3) * 43758.5453; return s - Math.floor(s); };

  const cv = $("scene");
  let ctx, W, H, DPR, atomR = 12;

  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx = cv.getContext("2d"); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    buildLattice();
  }

  function buildLattice() {
    const mx = W * 0.11, my = H * 0.17;
    const usableW = W - 2 * mx, usableH = H - 2 * my;
    const cols = clamp(Math.round(usableW / 110), 4, 7);
    const rows = clamp(Math.round(usableH / 110), 3, 5);
    const dx = cols > 1 ? usableW / (cols - 1) : 0;
    const dy = rows > 1 ? usableH / (rows - 1) : 0;
    atomR = clamp(Math.min(dx, dy) * 0.13, 9, 16);
    atoms = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        atoms.push({ x: mx + c * dx, y: my + r * dy, c, r });
    bonds = [];
    atoms.forEach((a, i) => {
      if (a.c < cols - 1) bonds.push([i, i + 1]);
      if (a.r < rows - 1) bonds.push([i, i + cols]);
    });
    dopeOrder = atoms.map((_, i) => i).sort((a, b) => hash(a) - hash(b));
    reg = { x0: W * 0.06, x1: W * 0.94, y0: H * 0.1, y1: H * 0.92 };
  }

  // jittered atom position (thermal vibration in place — the "stuck" look)
  function pos(i) {
    const a = atoms[i], amp = (0.5 + S.temp * 2.4) * motionScale;
    const f = 2 + S.temp * 6;
    return {
      x: a.x + amp * Math.sin(S.t * f + i * 1.7),
      y: a.y + amp * Math.cos(S.t * (f + 1) + i * 2.3),
    };
  }

  // ---- how many mobile carriers / fixed ions the current state calls for ----
  function targets() {
    if (S.material === "insulator") return { e: 0, h: 0, nd: 0, na: 0 };
    if (S.material === "conductor") return { e: atoms.length, h: 0, nd: 0, na: 0 };  // one free electron per + core → still neutral
    const thermal = Math.round(6 * Math.pow(S.temp, 1.7));           // heat frees electron–hole pairs
    const nd = S.dopeType === "n" ? Math.round(S.level * maxDopants) : 0;
    const na = S.dopeType === "p" ? Math.round(S.level * maxDopants) : 0;
    return { e: thermal + nd, h: thermal + na, nd, na };
  }

  function spawn(list) {
    list.push({ x: rand(reg.x0, reg.x1), y: rand(reg.y0, reg.y1), vx: rand(-1, 1), vy: rand(-1, 1) });
    flashes.push({ x: list[list.length - 1].x, y: list[list.length - 1].y, age: 0 });
  }

  function adjust(list, target) {
    if (list.length < target) spawn(list);
    else if (list.length > target) list.pop();
  }

  function moveCarrier(p, driftDir) {
    const vmax = (30 + 150 * S.temp) * motionScale;
    const jit = 900 * motionScale;
    p.vx += rand(-jit, jit) * S.dtLast;
    p.vy += rand(-jit, jit) * S.dtLast;
    const sp = Math.hypot(p.vx, p.vy) || 1;
    if (sp > vmax) { p.vx *= vmax / sp; p.vy *= vmax / sp; }
    const drift = S.field ? driftDir * 135 * motionScale : 0;
    p.x += (p.vx + drift) * S.dtLast;
    p.y += p.vy * S.dtLast;
    // walls: bounce vertically; under voltage wrap horizontally (steady current), else bounce
    if (p.y < reg.y0) { p.y = reg.y0; p.vy = Math.abs(p.vy); }
    if (p.y > reg.y1) { p.y = reg.y1; p.vy = -Math.abs(p.vy); }
    if (S.field) {
      if (p.x < reg.x0) p.x = reg.x1;
      if (p.x > reg.x1) p.x = reg.x0;
    } else {
      if (p.x < reg.x0) { p.x = reg.x0; p.vx = Math.abs(p.vx); }
      if (p.x > reg.x1) { p.x = reg.x1; p.vx = -Math.abs(p.vx); }
    }
  }

  function step(dt) {
    if (!S.running) return;
    S.dtLast = Math.min(dt, 0.05);
    S.t += S.dtLast;
    const t = targets();
    S.popTimer += S.dtLast;
    if (S.popTimer > 0.035) { S.popTimer = 0; adjust(electrons, t.e); adjust(holes, t.h); }
    electrons.forEach((p) => moveCarrier(p, +1));   // electrons drift toward + plate (right)
    holes.forEach((p) => moveCarrier(p, -1));        // holes drift toward – plate (left)
    for (let k = flashes.length - 1; k >= 0; k--) { flashes[k].age += S.dtLast; if (flashes[k].age > 0.5) flashes.splice(k, 1); }
  }

  // ---- drawing ----
  function drawField() {
    if (!S.field) return;
    const yb = reg.y0 - 4, yt = reg.y1 + 4;
    // faint field wash
    ctx.save();
    ctx.globalAlpha = 0.05;
    const grad = ctx.createLinearGradient(reg.x0, 0, reg.x1, 0);
    grad.addColorStop(0, C.sr); grad.addColorStop(1, C.sc);
    ctx.fillStyle = grad; ctx.fillRect(reg.x0, yb, reg.x1 - reg.x0, yt - yb);
    ctx.restore();
    const plate = (x, col, sign) => {
      ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.moveTo(x, yb); ctx.lineTo(x, yt); ctx.stroke();
      ctx.globalAlpha = 1; ctx.fillStyle = col; ctx.font = "600 20px " + mono;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(sign, x, (yb + yt) / 2);
    };
    plate(reg.x0 - 2, C.sr, "–");
    plate(reg.x1 + 2, C.sc, "+");
  }

  function drawLattice() {
    const covalent = S.material !== "conductor";
    // faint structural lines between neighbours
    ctx.strokeStyle = C.grid; ctx.lineWidth = 1.4;
    bonds.forEach(([i, j]) => {
      const a = pos(i), b = pos(j);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    });

    // locked valence electrons sit on the bonds (only in covalent solids)
    if (covalent) {
      ctx.fillStyle = C.muted; ctx.globalAlpha = 0.7;
      bonds.forEach(([i, j]) => {
        const a = pos(i), b = pos(j), dxp = b.y - a.y, dyp = a.x - b.x;
        const len = Math.hypot(dxp, dyp) || 1, ox = (dxp / len) * 3, oy = (dyp / len) * 3;
        [0.36, 0.64].forEach((f, k) => {
          const s = k ? 1 : -1;
          const x = a.x + (b.x - a.x) * f + ox * s, y = a.y + (b.y - a.y) * f + oy * s;
          ctx.beginPath(); ctx.arc(x, y, 2.7, 0, 7); ctx.fill();
        });
      });
      ctx.globalAlpha = 1;
    }

    const t = targets();
    const donors = S.dopeType === "n" ? dopeOrder.slice(0, t.nd) : [];
    const acceptors = S.dopeType === "p" ? dopeOrder.slice(0, t.na) : [];
    const donorSet = new Set(donors), acceptorSet = new Set(acceptors);

    // atom cores
    atoms.forEach((a, i) => {
      const p = pos(i);
      ctx.beginPath(); ctx.arc(p.x, p.y, atomR, 0, 7);
      ctx.fillStyle = C.panel2; ctx.fill();
      ctx.lineWidth = 1.6; ctx.strokeStyle = C.border; ctx.stroke();

      if (donorSet.has(i) || acceptorSet.has(i)) {
        // fixed dopant ion: amber ring, immobile, opposite charge to the carrier it released
        ctx.beginPath(); ctx.arc(p.x, p.y, atomR + 4, 0, 7);
        ctx.strokeStyle = C.sin; ctx.lineWidth = 2.2; ctx.stroke();
        ctx.fillStyle = C.sin; ctx.font = "600 15px " + mono;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(donorSet.has(i) ? "+" : "–", p.x, p.y + 0.5);
      } else if (!covalent) {
        // metal core: its valence electron has joined the free sea, leaving a + core
        ctx.fillStyle = C.muted; ctx.font = "600 13px " + mono;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("+", p.x, p.y + 0.5);
      }
    });
  }

  function drawFlash(f) {
    const k = f.age / 0.5;
    ctx.globalAlpha = (1 - k) * 0.5;
    ctx.strokeStyle = C.accent; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(f.x, f.y, 4 + k * 16, 0, 7); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawElectron(p) {
    ctx.save();
    ctx.shadowColor = C.sc; ctx.shadowBlur = 12;
    ctx.fillStyle = C.sc;
    ctx.beginPath(); ctx.arc(p.x, p.y, 6.5, 0, 7); ctx.fill();
    ctx.restore();
    ctx.fillStyle = C.bg; ctx.font = "700 11px " + mono;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("–", p.x, p.y + 0.5);
  }

  function drawHole(p) {
    ctx.strokeStyle = C.sr; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(p.x, p.y, 6.5, 0, 7); ctx.stroke();
    ctx.fillStyle = C.sr; ctx.font = "700 12px " + mono;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("+", p.x, p.y + 0.5);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawField();
    drawLattice();
    flashes.forEach(drawFlash);
    holes.forEach(drawHole);
    electrons.forEach(drawElectron);
    updateReadout();
  }

  function updateReadout() {
    $("cnt-e").textContent = electrons.length;
    $("cnt-h").textContent = holes.length;
    const t = targets();
    const ions = t.nd + t.na;
    $("chip-ion").classList.toggle("hide", ions === 0);
    $("cnt-ion").textContent = ions;
    $("chip-locked").classList.toggle("hide", S.material === "conductor");
  }

  // ---- loop ----
  let last = performance.now();
  function frame(now) { const dt = (now - last) / 1000; last = now; step(dt); draw(); requestAnimationFrame(frame); }

  // ---- controls ----
  function setMaterial(m) {
    S.material = m;
    $("mat-ins").setAttribute("aria-pressed", m === "insulator");
    $("mat-semi").setAttribute("aria-pressed", m === "semiconductor");
    $("mat-cond").setAttribute("aria-pressed", m === "conductor");
    updateUI();
  }
  function setDope(d) {
    S.dopeType = d;
    $("dope-p").setAttribute("aria-pressed", d === "p");
    $("dope-i").setAttribute("aria-pressed", d === "i");
    $("dope-n").setAttribute("aria-pressed", d === "n");
    updateUI();
  }
  function updateUI() {
    const semi = S.material === "semiconductor";
    $("dope-ctrl").classList.toggle("hide", !semi);
    $("level-ctrl").classList.toggle("hide", !(semi && S.dopeType !== "i"));
  }

  $("mat-ins").onclick = () => setMaterial("insulator");
  $("mat-semi").onclick = () => setMaterial("semiconductor");
  $("mat-cond").onclick = () => setMaterial("conductor");
  $("dope-p").onclick = () => setDope("p");
  $("dope-i").onclick = () => setDope("i");
  $("dope-n").onclick = () => setDope("n");
  $("temp-slider").oninput = (e) => { S.temp = parseFloat(e.target.value); };
  $("level-slider").oninput = (e) => { S.level = parseFloat(e.target.value); };
  $("volt-btn").onclick = () => {
    S.field = !S.field;
    $("volt-btn").classList.toggle("on", S.field);
    $("volt-label").textContent = S.field ? "Voltage on" : "Apply voltage";
  };
  $("play-btn").onclick = () => { S.running = !S.running; $("play-btn").textContent = S.running ? "Pause" : "Play"; last = performance.now(); };
  $("reset-btn").onclick = () => {
    electrons.length = 0; holes.length = 0; flashes.length = 0;
    S.temp = 0.28; S.field = false; S.dopeType = "i"; S.level = 0.5;
    $("temp-slider").value = 0.28; $("level-slider").value = 0.5;
    $("volt-btn").classList.remove("on"); $("volt-label").textContent = "Apply voltage";
    setMaterial("semiconductor"); setDope("i");
  };

  new ResizeObserver(fit).observe(cv);
  window.addEventListener("resize", fit);
  S.dtLast = 0.016;
  fit(); setMaterial("semiconductor"); setDope("i"); requestAnimationFrame(frame);
})();
</script>
