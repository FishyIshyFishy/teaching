<title>D flip-flop — the gates</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --ok: #1f9d57;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c; --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
  }
  :root[data-theme="light"] {
    --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff; --ok: #1f9d57;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding: clamp(14px, 2.4vw, 34px); -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1060px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .26em; text-transform: uppercase; color: var(--muted); }
  .bar-right { display: flex; align-items: center; gap: 12px; }
  .pill { font-family: var(--mono); font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--panel-2); }
  .pill.hi { color: var(--accent-ink); background: var(--sig-in); border-color: transparent; }
  .icon-btn { font-family: var(--mono); font-size: .95rem; line-height: 1; color: var(--muted); background: var(--panel-2); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; }
  .icon-btn:hover { border-color: var(--accent); color: var(--ink); }

  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 11px; padding: 3px; gap: 2px; }
  .seg button { font-family: var(--mono); font-size: .82rem; letter-spacing: .08em; color: var(--muted); background: transparent; border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  .seg button:hover { color: var(--ink); }
  .seg button.on { color: var(--accent-ink); background: var(--accent); }

  .stage { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  canvas { display: block; width: 100%; height: clamp(520px, 74vw, 720px); }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 16px 22px; padding: 2px; }
  .btn { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 10px 18px; border-radius: 9px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }

  .inputs { display: flex; flex-wrap: wrap; gap: 12px; }
  .switch { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 8px 12px 8px 14px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 11px; }
  .switch:hover { border-color: var(--accent); }
  .switch .name { font-weight: 600; color: var(--muted); }
  .switch.on .name { color: var(--sig-in); }
  .switch .track { width: 34px; height: 18px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); position: relative; transition: background .15s, border-color .15s; }
  .switch .thumb { position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; border-radius: 50%; background: var(--muted); transition: left .15s, background .15s; }
  .switch.on .track { background: var(--sig-in); border-color: transparent; }
  .switch.on .thumb { left: 17px; background: var(--accent-ink); }
  .switch .val { min-width: 1ch; text-align: center; color: var(--muted); }
  .switch.on .val { color: var(--sig-in); }

  .rng { display: inline-flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: .78rem; letter-spacing: .04em; color: var(--muted); }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 148px; height: 4px; border-radius: 999px; background: var(--border); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 0; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 0; }

  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="bar">
      <span class="eyebrow">D flip-flop · six NAND gates</span>
      <div class="bar-right">
        <span class="pill" id="status">Q = 0</span>
        <button class="icon-btn" id="theme-btn" title="Toggle light / dark">◐</button>
      </div>
    </div>

    <div class="stage"><canvas id="scene" aria-label="A positive-edge-triggered D flip-flop built from six cross-coupled NAND gates, with D and clock inputs and Q / Q-bar outputs. Below the schematic, a scrolling timing diagram shows the clock, D, and Q, so Q is seen to sample D only on each rising clock edge."></canvas></div>

    <div class="deck">
      <div class="inputs" id="inputs"></div>
      <div class="seg" id="mode"></div>
      <div id="clk-ctrl"></div>
      <button class="btn" id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const cssv = getComputedStyle(document.documentElement);
  const mono = cssv.getPropertyValue("--mono");

  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"),
      border: g("--border"), sin: g("--sig-in"), accent: g("--accent"), aink: g("--accent-ink"),
      ok: g("--ok"), bg: g("--bg"), panel: g("--panel") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  const nand = (...a) => (a.every((x) => x) ? 0 : 1);

  // ---- the flip-flop, as six NAND gates -----------------------------------
  // A positive-edge-triggered D flip-flop is six NAND gates wired in three
  // cross-coupled pairs. Each gate's inputs are the OUTPUTS of other gates (and
  // D / the clock) — so there is no "first" gate to evaluate in order. As with
  // the SR latch, we settle the whole tangle by iterating every gate equation
  // to a steady state each frame. The edge-triggering is not coded anywhere; it
  // simply falls out of how the gates feed one another.
  const gate = {
    n1: ["n2", "n4"],
    n2: ["n1", "CLK"],
    n3: ["n2", "CLK", "n4"],
    n4: ["n3", "D"],
    n5: ["n2", "n6"],        // Q
    n6: ["n5", "n3"],        // Q-bar
  };
  const ids = ["n1", "n2", "n3", "n4", "n5", "n6"];

  // every wire in the picture: {from, to, port, route-kind + channels}
  // kinds — fwd: out→[vx]→in ; wrapT/wrapB: feedback over top / under bottom ;
  //         gapU/gapD: cross-couple through the pair's gap (like the SR latch).
  const links = [
    { s: "n1", t: "n2", k: 0, kind: "fwd", vx: 0.40 },
    { s: "n2", t: "n1", k: 0, kind: "wrapT", yc: 0.055, rx: 0.245 },
    { s: "n2", t: "n3", k: 0, kind: "gapL", vx: 0.55, yc: 0.305, rx: 0.435 },
    { s: "n2", t: "n5", k: 0, kind: "fwd", vx: 0.60 },
    { s: "n4", t: "n1", k: 1, kind: "wrapT", yc: 0.032, rx: 0.205 },
    { s: "n4", t: "n3", k: 2, kind: "fwd", vx: 0.42 },
    { s: "CLK", t: "n2", k: 1, kind: "clk" },
    { s: "CLK", t: "n3", k: 1, kind: "clk" },
    { s: "n3", t: "n4", k: 0, kind: "wrapB", yc: 0.55, rx: 0.245 },
    { s: "n3", t: "n6", k: 1, kind: "fwd", vx: 0.635 },
    { s: "D", t: "n4", k: 1, kind: "din" },
    { s: "n5", t: "n6", k: 0, kind: "gapD", yc: 0.30, dd: 0.05, rx: 0.665 },
    { s: "n6", t: "n5", k: 1, kind: "gapU", yc: 0.30, dd: 0.05, rx: 0.685 },
  ];

  // ---- state ---------------------------------------------------------------
  let d = 0, clk = 0;
  const o = { n1: 1, n2: 1, n3: 1, n4: 1, n5: 0, n6: 1 };   // gate outputs (state)
  const dv = { n1: 1, n2: 1, n3: 1, n4: 1, n5: 0, n6: 1 };  // eased display values
  let dd = 0, dclk = 0;

  let mode = "auto", speed = 55, manualClk = 0, clkAcc = 0;
  const hist = []; const maxSamples = 260; let sampAcc = 0; const sampInt = 0.03;

  function settle() {
    for (let it = 0; it < 24; it++) {
      o.n1 = nand(o.n2, o.n4);
      o.n2 = nand(o.n1, clk);
      o.n3 = nand(o.n2, clk, o.n4);
      o.n4 = nand(o.n3, d);
      o.n5 = nand(o.n2, o.n6);
      o.n6 = nand(o.n5, o.n3);
    }
  }

  function step(dt) {
    dt = Math.min(dt, 0.05);
    if (mode === "auto") {
      const half = lerp(1.4, 0.16, speed / 100);
      clkAcc += dt;
      while (clkAcc >= half) { clkAcc -= half; clk = clk ? 0 : 1; }
    } else clk = manualClk;
    settle();

    sampAcc += dt;
    while (sampAcc >= sampInt) { sampAcc -= sampInt; hist.push({ clk, d, q: o.n5 }); if (hist.length > maxSamples) hist.shift(); }

    const e = 1 - Math.pow(0.006, dt);
    dd += (d - dd) * e; dclk += (clk - dclk) * e;
    for (const id of ids) dv[id] += (o[id] - dv[id]) * e;
  }

  const srcVal = (name) => (name === "CLK" ? dclk : name === "D" ? dd : dv[name]);

  // ---- canvas + layout -----------------------------------------------------
  const cv = $("scene");
  let ctx, W, H, DPR, g = {};

  // gate centres and lamps as fractions of the schematic — nudge here to tune.
  const place = {
    n1: [0.31, 0.13], n2: [0.49, 0.20], n3: [0.49, 0.41], n4: [0.31, 0.48],
    n5: [0.72, 0.22], n6: [0.72, 0.38],
    D: [0.06, 0.50], CLK: [0.06, 0.12], Q: [0.93, 0.22], Qb: [0.93, 0.38],
  };

  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx = cv.getContext("2d"); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const bw = clamp(W * 0.08, 56, 84), bh = clamp(H * 0.06, 36, 54), br = clamp(bh * 0.15, 4, 7);
    const pos = {};
    for (const key in place) pos[key] = [place[key][0] * W, place[key][1] * H];
    g = {
      bw, bh, br, pos,
      lampR: clamp(W * 0.024, 15, 21),
      xclk: 0.15 * W,
      tTop: 0.64 * H, tBot: 0.955 * H, tL: 0.14 * W, tR: 0.96 * W,
    };
  }

  // ---- gate ports ----
  const hw = () => g.bw / 2;
  function outP(id) { const [x, y] = g.pos[id]; return [x + hw() + 2 * g.br, y]; }
  function inP(id, k) {
    const [x, y] = g.pos[id], n = gate[id].length, off = g.bh * 0.26;
    let dy = n === 1 ? 0 : n === 2 ? (k === 0 ? -off : off) : (k - 1) * g.bh * 0.32;
    return [x - hw(), y + dy];
  }

  // build the pixel polyline for one link
  function routeOf(L) {
    const stub = 0.014 * W;
    const to = inP(L.t, L.k);
    if (L.kind === "fwd") { const o0 = outP(L.s), vx = L.vx * W; return [o0, [vx, o0[1]], [vx, to[1]], to]; }
    if (L.kind === "clk") { const cl = g.pos.CLK; return [[cl[0] + g.lampR, cl[1]], [g.xclk, cl[1]], [g.xclk, to[1]], to]; }
    if (L.kind === "din") { const dl = g.pos.D; return [[dl[0] + g.lampR, to[1]], to]; }
    if (L.kind === "wrapT") { const o0 = outP(L.s); return [o0, [o0[0] + stub, o0[1]], [o0[0] + stub, L.yc * H], [L.rx * W, L.yc * H], [L.rx * W, to[1]], to]; }
    if (L.kind === "wrapB") { const o0 = outP(L.s); return [o0, [o0[0] + stub, o0[1]], [o0[0] + stub, L.yc * H], [L.rx * W, L.yc * H], [L.rx * W, to[1]], to]; }
    if (L.kind === "gapL") { const o0 = outP(L.s); return [o0, [L.vx * W, o0[1]], [L.vx * W, L.yc * H], [L.rx * W, L.yc * H], [L.rx * W, to[1]], to]; }
    if (L.kind === "gapD") { const o0 = outP(L.s); return [o0, [o0[0] + stub, o0[1]], [o0[0] + stub, (L.yc - L.dd) * H], [L.rx * W, (L.yc - L.dd) * H], [L.rx * W, to[1]], to]; }
    if (L.kind === "gapU") { const o0 = outP(L.s); return [o0, [o0[0] + stub, o0[1]], [o0[0] + stub, (L.yc + L.dd) * H], [L.rx * W, (L.yc + L.dd) * H], [L.rx * W, to[1]], to]; }
    return [outP(L.s), to];
  }

  // ---- drawing helpers ----
  const mix = (a, b, t) => {
    t = clamp(t, 0, 1);
    const p = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
    const pa = p(a.length === 7 ? a : "#888888"), pb = p(b.length === 7 ? b : "#888888");
    return `rgb(${Math.round(lerp(pa[0], pb[0], t))},${Math.round(lerp(pa[1], pb[1], t))},${Math.round(lerp(pa[2], pb[2], t))})`;
  };
  const hot = (v) => mix(C.muted, C.sin, v);
  const label = (txt, x, y, col, size, align) => {
    ctx.fillStyle = col; ctx.font = "600 " + (size || 12) + "px " + mono;
    ctx.textAlign = align || "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, x, y);
  };
  const dot = (x, y, r, col, glow) => {
    ctx.save(); if (glow) { ctx.shadowColor = col; ctx.shadowBlur = glow; }
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.restore();
  };
  function wire(pts, v) {
    const col = hot(v);
    ctx.save();
    ctx.globalAlpha = lerp(0.55, 1, v);
    ctx.shadowColor = col; ctx.shadowBlur = lerp(0, 10, v);
    ctx.strokeStyle = col; ctx.lineWidth = lerp(2, 3.4, v); ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke(); ctx.restore();
  }

  function nandPath(x0, cy, bw, bh) {          // AND body (flat back, round nose)
    const r = bh / 2;
    ctx.beginPath();
    ctx.moveTo(x0, cy - r);
    ctx.lineTo(x0 + bw - r, cy - r);
    ctx.arc(x0 + bw - r, cy, r, -Math.PI / 2, Math.PI / 2);
    ctx.lineTo(x0, cy + r);
    ctx.closePath();
  }
  function drawGate(id) {
    const [cx, cy] = g.pos[id], { bw, bh, br } = g, x0 = cx - bw / 2, v = dv[id], hi = v > 0.5, edge = hi ? C.sin : C.border;
    ctx.save();
    nandPath(x0, cy, bw, bh);
    ctx.fillStyle = mix(C.panel2, C.sin, v * 0.22); ctx.fill();
    if (hi) { ctx.shadowColor = C.sin; ctx.shadowBlur = 12; }
    ctx.strokeStyle = edge; ctx.lineWidth = hi ? 2.2 : 1.4; ctx.lineJoin = "round"; ctx.stroke();
    ctx.restore();
    const bx = x0 + bw + br;                    // NAND inversion bubble
    ctx.save(); ctx.fillStyle = C.panel; ctx.strokeStyle = edge; ctx.lineWidth = hi ? 2 : 1.4;
    ctx.beginPath(); ctx.arc(bx, cy, br, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
  }

  function drawLamp(x, y, valBit, dispVal, text, bar) {
    const r = g.lampR, on = dispVal > 0.5;
    ctx.save();
    if (on) { ctx.shadowColor = C.sin; ctx.shadowBlur = 18; }
    ctx.fillStyle = mix(C.panel2, C.sin, dispVal); ctx.strokeStyle = on ? C.sin : C.muted; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    label(valBit ? "1" : "0", x, y, on ? C.aink : C.muted, r * 0.85);
    label(text, x, y + r + 14, hot(dispVal), 12);
    if (bar) { const w = 7; ctx.strokeStyle = hot(dispVal); ctx.lineWidth = 1.4; ctx.beginPath(); ctx.moveTo(x - w, y + r + 7); ctx.lineTo(x + w, y + r + 7); ctx.stroke(); }
  }

  function drawSchematic() {
    for (const L of links) wire(routeOf(L), srcVal(L.s));
    // output taps: Q, Q-bar wires leave the latch gates
    wire([outP("n5"), [g.pos.Q[0] - g.lampR, outP("n5")[1]]], dv.n5);
    wire([outP("n6"), [g.pos.Qb[0] - g.lampR, outP("n6")[1]]], dv.n6);

    // junction dots where a gate output fans out to more than one place
    for (const id of ["n2", "n3", "n4", "n5", "n6"]) { const p = outP(id); dot(p[0], p[1], 3.2, hot(dv[id]), dv[id] > 0.5 ? 6 : 0); }

    for (const id of ids) drawGate(id);

    drawLamp(g.pos.D[0], g.pos.D[1], d, dd, "D");
    drawLamp(g.pos.CLK[0], g.pos.CLK[1], clk, dclk, "CLK");
    drawLamp(g.pos.Q[0], g.pos.Q[1], o.n5, dv.n5, "Q");
    drawLamp(g.pos.Qb[0], g.pos.Qb[1], o.n6, dv.n6, "Q", true);
  }

  function drawTiming() {
    const { tTop, tBot, tL, tR } = g;
    const lanes = [{ key: "clk", name: "CLK", col: C.accent }, { key: "d", name: "D", col: C.sin }, { key: "q", name: "Q", col: C.sin }];
    const laneH = (tBot - tTop) / lanes.length;
    const xAt = (i) => lerp(tL, tR, i / (maxSamples - 1));

    ctx.save(); ctx.strokeStyle = C.grid; ctx.lineWidth = 1;      // rising-edge guides
    for (let i = 1; i < hist.length; i++) if (hist[i].clk === 1 && hist[i - 1].clk === 0) {
      const x = xAt(i); ctx.beginPath(); ctx.moveTo(x, tTop + 6); ctx.lineTo(x, tBot - 6); ctx.stroke();
    }
    ctx.restore();

    lanes.forEach((lane, li) => {
      const top = tTop + li * laneH, hiY = top + laneH * 0.28, loY = top + laneH * 0.72;
      ctx.strokeStyle = C.grid; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(tL, loY); ctx.lineTo(tR, loY); ctx.stroke();
      label(lane.name, tL - 10, (hiY + loY) / 2, C.muted, 12, "right");
      if (hist.length > 1) {
        ctx.save(); ctx.strokeStyle = lane.col; ctx.lineWidth = 2.2; ctx.lineJoin = "round"; ctx.lineCap = "round";
        ctx.beginPath(); let py = hist[0][lane.key] ? hiY : loY; ctx.moveTo(xAt(0), py);
        for (let i = 1; i < hist.length; i++) { const x = xAt(i), y = hist[i][lane.key] ? hiY : loY; if (y !== py) ctx.lineTo(x, py); ctx.lineTo(x, y); py = y; }
        ctx.stroke(); ctx.restore();
      }
    });
  }

  function draw() { ctx.clearRect(0, 0, W, H); drawSchematic(); drawTiming(); }

  function updateStatus() { const el = $("status"); el.textContent = "Q = " + o.n5; el.classList.toggle("hi", o.n5 === 1); }

  let last = performance.now();
  function frame(now) { const dt = (now - last) / 1000; last = now; step(dt); draw(); updateStatus(); requestAnimationFrame(frame); }

  // ---- controls ----
  function buildInputs() {
    const host = $("inputs"); host.innerHTML = "";
    const b = document.createElement("button");
    b.className = "switch";
    b.innerHTML = '<span class="name">D</span><span class="track"><span class="thumb"></span></span><span class="val">0</span>';
    b.onclick = () => { d = d ? 0 : 1; syncInputs(); };
    host.appendChild(b); syncInputs();
  }
  function syncInputs() { const b = $("inputs").firstChild; if (!b) return; b.classList.toggle("on", d === 1); b.querySelector(".val").textContent = d ? "1" : "0"; }

  function buildMode() {
    const host = $("mode"); host.innerHTML = "";
    [["auto", "Auto clock"], ["manual", "Manual clock"]].forEach(([id, txt]) => {
      const b = document.createElement("button");
      b.textContent = txt; b.dataset.mode = id; b.classList.toggle("on", id === mode);
      b.onclick = () => { mode = id; if (mode === "manual") manualClk = clk; buildClkCtrl(); syncMode(); };
      host.appendChild(b);
    });
  }
  function syncMode() { for (const b of $("mode").children) b.classList.toggle("on", b.dataset.mode === mode); }

  function buildClkCtrl() {
    const host = $("clk-ctrl"); host.innerHTML = "";
    if (mode === "auto") {
      const box = document.createElement("label"); box.className = "rng"; box.innerHTML = "<span>slow</span>";
      const r = document.createElement("input");
      r.type = "range"; r.min = "0"; r.max = "100"; r.value = String(speed);
      r.oninput = () => { speed = Number(r.value); };
      box.appendChild(r);
      const fast = document.createElement("span"); fast.textContent = "fast"; box.appendChild(fast);
      host.appendChild(box);
    } else {
      const b = document.createElement("button"); b.className = "switch";
      b.innerHTML = '<span class="name">CLK</span><span class="track"><span class="thumb"></span></span><span class="val">0</span>';
      const sync = () => { b.classList.toggle("on", manualClk === 1); b.querySelector(".val").textContent = manualClk ? "1" : "0"; };
      b.onclick = () => { manualClk = manualClk ? 0 : 1; sync(); };
      host.appendChild(b); sync();
    }
  }

  $("reset-btn").onclick = () => {
    d = 0; manualClk = 0; clk = 0; clkAcc = 0;
    o.n1 = 1; o.n2 = 1; o.n3 = 1; o.n4 = 1; o.n5 = 0; o.n6 = 1;
    hist.length = 0; syncInputs(); buildClkCtrl();
  };
  $("theme-btn").onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme")
      || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
  };

  new ResizeObserver(fit).observe(cv);
  window.addEventListener("resize", fit);
  fit(); buildInputs(); buildMode(); buildClkCtrl(); requestAnimationFrame(frame);
})();
</script>
