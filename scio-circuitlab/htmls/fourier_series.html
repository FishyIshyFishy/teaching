<title>Fourier Series — draw a signal</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --target: #e3b341; --sum: #eef4f7; --harm: #3fc5e6; --new: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --target: #b9821f; --sum: #16232b; --harm: #1298bf; --new: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5); }
  }
  :root[data-theme="dark"] { --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --target: #e3b341; --sum: #eef4f7; --harm: #3fc5e6; --new: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85); }
  :root[data-theme="light"] { --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --target: #b9821f; --sum: #16232b; --harm: #1298bf; --new: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5); }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding: clamp(14px, 2.4vw, 32px); -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1140px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .bar { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .24em; text-transform: uppercase; color: var(--accent); margin: 0; }
  h1 { font-size: clamp(1.2rem, 2vw, 1.55rem); margin: 4px 0 0; font-weight: 640; letter-spacing: -.01em; }
  .bar p { margin: 0; color: var(--muted); font-size: .84rem; font-family: var(--mono); }

  .grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr); gap: 14px; align-items: stretch; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
  .card > .head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .card .label { font-family: var(--mono); font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
  .legend { display: flex; gap: 14px; }
  .legend span { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: .7rem; color: var(--muted); }
  .legend i { width: 15px; height: 0; border-top-width: 3px; border-top-style: solid; }

  #signal { display: block; width: 100%; height: 340px; touch-action: none; cursor: crosshair; }
  .towerScroll { overflow-y: auto; height: 388px; }
  #tower { display: block; width: 100%; }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 20px; }
  .presets { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-family: var(--mono); font-size: .76rem; color: var(--ink); background: var(--panel-2); border: 1px solid var(--border); padding: 7px 12px; border-radius: 8px; cursor: pointer; }
  .chip:hover { border-color: var(--accent); }
  .btn { font-family: var(--mono); font-size: .82rem; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 9px 16px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }
  .ctrl { display: flex; flex-direction: column; gap: 6px; flex: 1 1 240px; min-width: 200px; }
  .ctrl .lab { display: flex; justify-content: space-between; font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .ctrl .lab b { color: var(--ink); font-variant-numeric: tabular-nums; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 22px; background: transparent; cursor: pointer; margin: 0; }
  input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 3px; background: var(--border); }
  input[type="range"]::-moz-range-track { height: 4px; border-radius: 3px; background: var(--border); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; margin-top: -6px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="grid">
      <div class="card">
        <canvas id="signal" aria-label="Draw f(t) here; the running sum of Fourier terms is drawn over it"></canvas>
      </div>

      <div class="card">
        <div class="towerScroll"><canvas id="tower" aria-label="Each harmonic term, stacked; included ones are bright"></canvas></div>
      </div>
    </div>

    <div class="deck">
      <div class="presets" id="presets">
        <button class="chip" data-p="square">Square</button>
        <button class="chip" data-p="sawtooth">Sawtooth</button>
        <button class="chip" data-p="triangle">Triangle</button>
        <button class="chip" data-p="pulse">Pulse</button>
        <button class="chip" data-p="clear">Clear</button>
      </div>
      <div class="ctrl">
        <div class="lab"><span>terms</span><b id="nread">0</b></div>
        <input type="range" id="nslider" min="0" max="24" step="1" value="0" aria-label="Number of terms">
      </div>
      <button class="btn primary" id="play">Play</button>
      <button class="btn" id="reset">Reset terms</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const TAU = Math.PI * 2;
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const cssv = getComputedStyle(document.documentElement);
  const MONO = cssv.getPropertyValue("--mono");

  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"), border: g("--border"),
      target: g("--target"), sum: g("--sum"), harm: g("--harm"), new: g("--new"), accent: g("--accent") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  const M = 480;                 // samples over one period
  const MAXN = 24;               // harmonics
  const YMAX = 1.25;             // display amplitude range
  const f = new Float32Array(M); // the drawn signal, one period
  let a = new Float32Array(MAXN + 1), b = new Float32Array(MAXN + 1);

  const S = { N: 0, frac: 0, playing: false };

  // ---- Fourier coefficients (numerical integration over one period) ----
  function computeCoeffs() {
    let s0 = 0; for (let i = 0; i < M; i++) s0 += f[i];
    a[0] = s0 / M; b[0] = 0;
    for (let n = 1; n <= MAXN; n++) {
      let sa = 0, sb = 0;
      for (let i = 0; i < M; i++) { const t = TAU * i / M; sa += f[i] * Math.cos(n * t); sb += f[i] * Math.sin(n * t); }
      a[n] = 2 * sa / M; b[n] = 2 * sb / M;
    }
  }
  const term = (n, t) => n === 0 ? a[0] : a[n] * Math.cos(n * t) + b[n] * Math.sin(n * t);
  function sumAt(t) {
    let v = a[0];
    for (let n = 1; n <= S.N; n++) v += term(n, t);
    if (S.frac > 0 && S.N + 1 <= MAXN) v += S.frac * term(S.N + 1, t);
    return v;
  }

  // ---- presets ----
  function setPreset(name) {
    for (let i = 0; i < M; i++) {
      const t = TAU * i / M, x = i / M;                 // t in [0,2π), x in [0,1)
      f[i] = name === "square" ? (x < 0.5 ? 1 : -1)
        : name === "sawtooth" ? (2 * x - 1)
        : name === "triangle" ? (x < 0.5 ? 4 * x - 1 : 3 - 4 * x)
        : name === "pulse" ? (x > 0.35 && x < 0.5 ? 1 : 0)
        : 0;                                            // clear
    }
    computeCoeffs();
  }

  // ---- canvases ----
  const sig = $("signal"), tow = $("tower");
  let sctx, sw, sh, tctx, tw, th, DPR;
  const ROWH = 46;
  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    sw = sig.clientWidth; sh = sig.clientHeight;
    sig.width = Math.round(sw * DPR); sig.height = Math.round(sh * DPR);
    sctx = sig.getContext("2d"); sctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    tw = tow.parentElement.clientWidth; th = (MAXN + 1) * ROWH;
    tow.style.height = th + "px"; tow.width = Math.round(tw * DPR); tow.height = Math.round(th * DPR);
    tctx = tow.getContext("2d"); tctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  const sigX = (t) => 6 + (t / TAU) * (sw - 12);      // t in [0,2π] -> px
  const sigY = (v) => lerp(sh - 10, 10, (clamp(v, -YMAX, YMAX) + YMAX) / (2 * YMAX));

  function drawSignal() {
    sctx.clearRect(0, 0, sw, sh);
    // grid
    sctx.strokeStyle = C.grid; sctx.lineWidth = 1;
    for (const v of [-1, 0, 1]) { const y = sigY(v); sctx.globalAlpha = v === 0 ? 1 : .6; sctx.beginPath(); sctx.moveTo(6, y); sctx.lineTo(sw - 6, y); sctx.stroke(); }
    sctx.globalAlpha = 1;
    for (let k = 1; k < 4; k++) { const x = lerp(6, sw - 6, k / 4); sctx.globalAlpha = .45; sctx.beginPath(); sctx.moveTo(x, 8); sctx.lineTo(x, sh - 8); sctx.stroke(); }
    sctx.globalAlpha = 1;

    // target signal (dashed)
    sctx.strokeStyle = C.target; sctx.lineWidth = 2; sctx.setLineDash([6, 5]);
    sctx.beginPath();
    for (let i = 0; i < M; i++) { const x = sigX(TAU * i / M), y = sigY(f[i]); i ? sctx.lineTo(x, y) : sctx.moveTo(x, y); }
    sctx.stroke(); sctx.setLineDash([]);

    // faint: the harmonic currently folding in
    if (S.frac > 0 && S.N + 1 <= MAXN) {
      sctx.strokeStyle = C.new; sctx.globalAlpha = .5 * S.frac; sctx.lineWidth = 1.5;
      sctx.beginPath();
      for (let px = 6; px <= sw - 6; px += 2) { const t = (px - 6) / (sw - 12) * TAU, y = sigY(a[0] + S.frac * term(S.N + 1, t)); px === 6 ? sctx.moveTo(px, y) : sctx.lineTo(px, y); }
      sctx.stroke(); sctx.globalAlpha = 1;
    }

    // running sum (bold)
    sctx.strokeStyle = C.sum; sctx.lineWidth = 2.6; sctx.shadowColor = C.sum; sctx.shadowBlur = reduceMotion ? 0 : 5;
    sctx.beginPath();
    for (let px = 6; px <= sw - 6; px += 1.5) { const t = (px - 6) / (sw - 12) * TAU, y = sigY(sumAt(t)); px === 6 ? sctx.moveTo(px, y) : sctx.lineTo(px, y); }
    sctx.stroke(); sctx.shadowBlur = 0;
  }

  function drawTower() {
    tctx.clearRect(0, 0, tw, th);
    for (let n = 0; n <= MAXN; n++) {
      const y0 = n * ROWH, midY = y0 + ROWH / 2 + 4;
      const included = n <= S.N, isNew = n === S.N + 1 && S.frac > 0;
      const alpha = included ? 1 : isNew ? .35 + .5 * S.frac : .16;
      const col = isNew ? C.new : (n <= S.N ? C.harm : C.muted);
      // divider
      tctx.strokeStyle = C.grid; tctx.globalAlpha = .5; tctx.lineWidth = 1;
      tctx.beginPath(); tctx.moveTo(10, y0 + ROWH); tctx.lineTo(tw - 10, y0 + ROWH); tctx.stroke(); tctx.globalAlpha = 1;
      // label
      tctx.fillStyle = included || isNew ? C.ink : C.muted; tctx.globalAlpha = clamp(alpha + .25, 0, 1);
      tctx.font = "600 12px " + MONO; tctx.textAlign = "left"; tctx.textBaseline = "middle";
      tctx.fillText(n === 0 ? "DC" : "n=" + n, 12, midY);
      tctx.globalAlpha = 1;
      // wave for this term
      const px0 = 60, px1 = tw - 16, amp2 = (ROWH / 2 - 7) / YMAX;
      tctx.strokeStyle = col; tctx.globalAlpha = alpha; tctx.lineWidth = isNew ? 2.4 : 2;
      tctx.beginPath();
      for (let px = px0; px <= px1; px += 2) { const t = (px - px0) / (px1 - px0) * TAU, y = midY - clamp(term(n, t), -YMAX, YMAX) * amp2; px === px0 ? tctx.moveTo(px, y) : tctx.lineTo(px, y); }
      tctx.stroke(); tctx.globalAlpha = 1;
    }
  }

  // ---- drawing interaction ----
  let drawing = false, lastI = -1;
  function toData(e) {
    const r = sig.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    const i = clamp(Math.round((cx - 6) / (sw - 12) * (M - 1)), 0, M - 1);
    const v = clamp((1 - (cy - 10) / (sh - 20)) * 2 * YMAX - YMAX, -YMAX, YMAX);
    return { i, v };
  }
  function paint(e) {
    const { i, v } = toData(e);
    if (lastI < 0) f[i] = v;
    else { const lo = Math.min(lastI, i), hi = Math.max(lastI, i); for (let k = lo; k <= hi; k++) f[k] = hi === lo ? v : lerp(f[lastI], v, (k - lastI) / (i - lastI)); }
    lastI = i;
  }
  function startDraw(e) { drawing = true; lastI = -1; S.playing = false; $("play").textContent = "Play"; paint(e); e.preventDefault(); }
  function moveDraw(e) { if (drawing) { paint(e); e.preventDefault(); } }
  function endDraw() { if (drawing) { drawing = false; lastI = -1; computeCoeffs(); } }
  sig.addEventListener("pointerdown", startDraw);
  sig.addEventListener("pointermove", moveDraw);
  window.addEventListener("pointerup", endDraw);

  // ---- controls ----
  function setN(n) { S.N = clamp(n, 0, MAXN); S.frac = 0; $("nslider").value = S.N; $("nread").textContent = S.N; }
  $("nslider").oninput = (e) => { S.playing = false; $("play").textContent = "Play"; setN(parseInt(e.target.value)); };
  $("reset").onclick = () => { S.playing = false; $("play").textContent = "Play"; setN(0); };
  $("play").onclick = () => {
    if (S.N >= MAXN && !S.playing) setN(0);
    S.playing = !S.playing; $("play").textContent = S.playing ? "Pause" : "Play";
  };
  $("presets").onclick = (e) => { const p = e.target.dataset.p; if (!p) return; setPreset(p); setN(0); };

  // ---- loop ----
  let last = performance.now();
  function frame(now) {
    const dt = (now - last) / 1000; last = now;
    if (S.playing) {
      S.frac += dt * 0.9;
      if (S.frac >= 1) { S.frac = 0; setN(S.N + 1); if (S.N >= MAXN) { S.playing = false; $("play").textContent = "Play"; } }
      $("nread").textContent = S.N;
      // keep the newest harmonic in view
      const sc = tow.parentElement, tgt = clamp((S.N + 1) * ROWH - sc.clientHeight / 2, 0, th - sc.clientHeight);
      sc.scrollTop = reduceMotion ? tgt : lerp(sc.scrollTop, tgt, 0.12);
    }
    drawSignal(); drawTower();
    requestAnimationFrame(frame);
  }

  new ResizeObserver(fit).observe(sig);
  window.addEventListener("resize", fit);
  fit(); setPreset("square"); setN(0);
  requestAnimationFrame(frame);
})();
</script>
