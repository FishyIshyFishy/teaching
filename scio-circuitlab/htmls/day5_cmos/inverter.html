<title>CMOS logic gates — switches to logic</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --ok: #1f9d57;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c; --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
  }
  :root[data-theme="light"] {
    --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff; --ok: #1f9d57;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding: clamp(14px, 2.4vw, 34px); -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .26em; text-transform: uppercase; color: var(--muted); }
  .pill { font-family: var(--mono); font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--panel-2); }
  .pill.hi { color: var(--accent-ink); background: var(--sig-in); border-color: transparent; }

  .stage { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  canvas { display: block; width: 100%; height: clamp(400px, 60vw, 560px); }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 22px; padding: 2px; }
  .seg { display: inline-flex; gap: 8px; }
  .btn { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 10px 18px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 9px; }
  .btn:hover { border-color: var(--accent); }
  .btn.on { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }
  .sep { width: 1px; align-self: stretch; background: var(--border); margin: 2px 0; }

  /* input toggles — one per gate input, so this row scales from A to A,B unchanged */
  .inputs { display: flex; flex-wrap: wrap; gap: 12px; }
  .switch { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 8px 12px 8px 14px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 11px; }
  .switch:hover { border-color: var(--accent); }
  .switch .name { font-weight: 600; color: var(--muted); }
  .switch.on .name { color: var(--sig-in); }
  .switch .track { width: 34px; height: 18px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); position: relative; transition: background .15s, border-color .15s; }
  .switch .thumb { position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; border-radius: 50%; background: var(--muted); transition: left .15s, background .15s; }
  .switch.on .track { background: var(--sig-in); border-color: transparent; }
  .switch.on .thumb { left: 17px; background: var(--accent-ink); }
  .switch .val { min-width: 1ch; text-align: center; color: var(--muted); }
  .switch.on .val { color: var(--sig-in); }

  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="bar">
      <span class="eyebrow" id="eyebrow">CMOS — NOT</span>
      <span class="pill" id="status">OUT = 1</span>
    </div>

    <div class="stage"><canvas id="scene" aria-label="A CMOS logic gate at the transistor level: a PMOS pull-up network between VDD and the output, an NMOS pull-down network between the output and ground. Whichever network conducts connects the output to its rail and sets the output value."></canvas></div>

    <div class="deck">
      <div class="seg" id="seg">
        <button class="btn" data-gate="NOT">NOT</button>
        <button class="btn" data-gate="NAND">NAND</button>
        <button class="btn" data-gate="NOR">NOR</button>
      </div>
      <div class="sep"></div>
      <div class="inputs" id="inputs"></div>
      <button class="btn" id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const cssv = getComputedStyle(document.documentElement);
  const mono = cssv.getPropertyValue("--mono");

  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"),
      border: g("--border"), sin: g("--sig-in"), sc: g("--sig-c"), sr: g("--sig-r"),
      accent: g("--accent"), aink: g("--accent-ink"), ok: g("--ok"), bg: g("--bg"), panel: g("--panel") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  // ---- the gates, described only by TOPOLOGY (never a precomputed truth table) ----
  // a network is a list of transistors wired in "series" or "parallel".
  // p = PMOS (on when its input is 0), n = NMOS (on when its input is 1).
  const p = (input) => ({ type: "p", input });
  const n = (input) => ({ type: "n", input });
  const net = (mode, fets) => ({ mode, fets });
  const gates = {
    NOT:  { inputs: ["A"],      pullUp: net("series", [p("A")]),          pullDown: net("series",   [n("A")]) },
    NAND: { inputs: ["A", "B"], pullUp: net("parallel", [p("A"), p("B")]), pullDown: net("series",   [n("A"), n("B")]) },
    NOR:  { inputs: ["A", "B"], pullUp: net("series",   [p("A"), p("B")]), pullDown: net("parallel", [n("A"), n("B")]) },
  };
  let current = "NOT";
  const gate = () => gates[current];

  // input values are clean 0/1; vin/vout ease so lamps and wire colors glide.
  const S = { inputs: [0], vin: [0], vout: 1, t: 0 };

  // ---- conduction: a transistor is on per its type; the output emerges from it ----
  const inputIndex = (name) => gate().inputs.indexOf(name);
  const inputValue = (name) => S.inputs[inputIndex(name)] ?? 0;
  const inputEase = (name) => S.vin[inputIndex(name)] ?? 0;
  const fetOn = (f) => (f.type === "p" ? inputValue(f.input) === 0 : inputValue(f.input) === 1);
  const conducts = (network) => {
    const ons = network.fets.map(fetOn);
    return network.mode === "parallel" ? ons.some(Boolean) : ons.every(Boolean);
  };
  const gateOutput = () => (conducts(gate().pullUp) ? 1 : 0);

  const cv = $("scene");
  let ctx, W, H, DPR, g = {};

  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx = cv.getContext("2d"); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    const cx = W * 0.42;
    const boxW = clamp(W * 0.13, 92, 150), boxH = clamp(H * 0.13, 52, 82);
    const colGap = boxW + clamp(W * 0.06, 46, 92);
    g = {
      cx, boxW, boxH, colGap, stagger: boxH * 0.62,
      vddY: H * 0.11, gndY: H * 0.89, outY: H * 0.5,
      railL: cx - colGap / 2 - boxW / 2 - 6,
      railR: cx + colGap / 2 + boxW / 2 + 6,
      outX: W * 0.82,
    };
  }

  function step(dt) {
    dt = Math.min(dt, 0.05); S.t += dt;
    const e = 1 - Math.pow(0.004, dt);
    for (let i = 0; i < S.inputs.length; i++) S.vin[i] += (S.inputs[i] - S.vin[i]) * e;
    S.vout += (gateOutput() - S.vout) * e;
  }

  // ---- drawing primitives ----
  const mix = (a, b, t) => {
    t = clamp(t, 0, 1);
    const parse = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
    const pa = parse(a.length === 7 ? a : "#888888"), pb = parse(b.length === 7 ? b : "#888888");
    return `rgb(${Math.round(lerp(pa[0], pb[0], t))},${Math.round(lerp(pa[1], pb[1], t))},${Math.round(lerp(pa[2], pb[2], t))})`;
  };
  const line = (x1, y1, x2, y2, col, w) => { ctx.strokeStyle = col; ctx.lineWidth = w || 3; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); };
  const label = (txt, x, y, col, size, align) => {
    ctx.fillStyle = col; ctx.font = "600 " + (size || 12) + "px " + mono;
    ctx.textAlign = align || "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, x, y);
  };
  const dot = (x, y, r, col, glow) => {
    ctx.save(); if (glow) { ctx.shadowColor = col; ctx.shadowBlur = glow; }
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.restore();
  };

  // --- wire connectivity look (tweak/roll back here in one place) ---
  // live = a real rail↔output connection (solid + glow); dead = path broken by an open switch (faint + dashed).
  const wireLook = {
    live: { width: 4, glow: 14, alpha: 1 },
    dead: { width: 2, glow: 0, alpha: 0.28, dash: [5, 8] },
  };
  function drawWire(x1, y1, x2, y2, col, live) {
    const s = live ? wireLook.live : wireLook.dead;
    ctx.save();
    ctx.globalAlpha = s.alpha;
    if (s.dash) ctx.setLineDash(s.dash);
    if (s.glow) { ctx.shadowColor = col; ctx.shadowBlur = s.glow; }
    line(x1, y1, x2, y2, col, s.width);
    ctx.restore();
  }

  // ---- lay out one network as an arm from a rail to the output node ----
  // returns boxes (transistors), power-wire segments, and rail solder-taps.
  // series/single: one column, chained rail→box→…→node, whole arm shares conduction.
  // parallel: one arm per transistor (columns side by side, staggered in y), each live on its own.
  function layoutArm(network, yRail, yNode) {
    const { cx, boxW, boxH, colGap, stagger } = g;
    const dir = Math.sign(yNode - yRail);          // +1 pull-up (down to node), -1 pull-down (up to node)
    const edgeRail = (by) => by - dir * boxH / 2;  // box edge facing the rail
    const edgeNode = (by) => by + dir * boxH / 2;  // box edge facing the node
    const boxes = [], wires = [], taps = [];
    const fets = network.fets;

    if (network.mode === "parallel") {
      const xs = fets.length === 2 ? [cx - colGap / 2, cx + colGap / 2] : [cx];
      const mid = (yRail + yNode) / 2;
      const ys = fets.length === 2 ? [mid - stagger, mid + stagger] : [mid];
      fets.forEach((f, i) => {
        const bx = xs[i], by = ys[i], on = fetOn(f);
        boxes.push({ x: bx, y: by, type: f.type, input: f.input });
        wires.push({ x1: bx, y1: yRail, x2: bx, y2: edgeRail(by), live: on });   // rail → box
        wires.push({ x1: bx, y1: edgeNode(by), x2: bx, y2: yNode, live: on });   // box → output bus
        taps.push({ x: bx, y: yRail, live: on });
      });
    } else {
      const nfet = fets.length;
      const centers = nfet === 1
        ? [(yRail + yNode) / 2]
        : [yRail + (yNode - yRail) * 0.30, yRail + (yNode - yRail) * 0.70];
      const on = conducts(network);
      let prev = yRail;
      fets.forEach((f, i) => {
        const by = centers[i];
        boxes.push({ x: cx, y: by, type: f.type, input: f.input });
        wires.push({ x1: cx, y1: prev, x2: cx, y2: edgeRail(by), live: on });    // previous → box
        prev = edgeNode(by);
      });
      wires.push({ x1: cx, y1: prev, x2: cx, y2: yNode, live: on });             // last box → output bus
      taps.push({ x: cx, y: yRail, live: on });
    }
    return { boxes, wires, taps };
  }

  function drawFet(b, on) {
    const w = g.boxW, h = g.boxH, x0 = b.x - w / 2, top = b.y - h / 2, bot = b.y + h / 2;
    ctx.fillStyle = C.panel2; ctx.globalAlpha = 0.6; ctx.fillRect(x0, top, w, h); ctx.globalAlpha = 1;
    ctx.strokeStyle = on ? C.ok : C.border; ctx.lineWidth = on ? 2.2 : 1.4;
    if (on) { ctx.save(); ctx.shadowColor = C.ok; ctx.shadowBlur = 12; ctx.strokeRect(x0, top, w, h); ctx.restore(); }
    else ctx.strokeRect(x0, top, w, h);

    // the switch: closed = a solid conducting bridge, open = a lifted contact + gap
    if (on) {
      ctx.save(); ctx.shadowColor = C.ok; ctx.shadowBlur = 10; line(b.x, top, b.x, bot, C.ok, 4); ctx.restore();
    } else {
      line(b.x, top, b.x, b.y - 13, C.muted, 3);
      line(b.x, b.y + 13, b.x, bot, C.muted, 3);
      ctx.globalAlpha = 0.7; line(b.x, b.y + 13, b.x + 16, b.y - 8, C.muted, 3); ctx.globalAlpha = 1;  // hinged-open arm
    }

    label(b.type === "p" ? "PMOS" : "NMOS", b.x, top - 11, C.muted, 11);
  }

  // gate connection: a short stub out the left of each transistor, labelled with its input.
  // PMOS carries the inversion bubble → it turns on when the gate is LOW. Colour tracks the input value.
  function drawGate(b) {
    const col = mix(C.muted, C.sin, inputEase(b.input));
    const gx = b.x - g.boxW / 2;
    let stubStart = gx;
    if (b.type === "p") {
      const r = 8;
      ctx.save(); ctx.fillStyle = C.panel; ctx.strokeStyle = col; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.arc(gx - r, b.y, r, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
      stubStart = gx - 2 * r;
    }
    const stubEnd = stubStart - 15;
    line(stubStart, b.y, stubEnd, b.y, col, 2.4);
    label(b.input, stubEnd - 11, b.y, col, 13, "right");
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const { vddY, gndY, outY, railL, railR, outX } = g;
    const up = layoutArm(gate().pullUp, vddY, outY);
    const down = layoutArm(gate().pullDown, gndY, outY);
    const boxes = up.boxes.concat(down.boxes);
    const outCol = mix(C.muted, C.sin, S.vout);

    // rails
    line(railL, vddY, railR, vddY, C.sin, 3);
    label("VDD = 1", railR + 10, vddY, C.sin, 12, "left");
    line(railL, gndY, railR, gndY, C.muted, 3);
    label("GND = 0", railR + 10, gndY, C.muted, 12, "left");

    // power-path wires: pull-up in VDD colour, pull-down in GND colour
    up.wires.forEach((w) => drawWire(w.x1, w.y1, w.x2, w.y2, C.sin, w.live));
    down.wires.forEach((w) => drawWire(w.x1, w.y1, w.x2, w.y2, C.muted, w.live));

    // solder joint where a live arm actually meets its rail
    up.taps.forEach((t) => t.live && dot(t.x, t.y, 5, C.sin, 8));
    down.taps.forEach((t) => t.live && dot(t.x, t.y, 5, C.muted, 6));

    // transistors as switches, drawn over their wires
    boxes.forEach((b) => drawFet(b, fetOn(b)));

    // output net: a bus across the columns, then the tap out to the lamp
    const xs = boxes.map((b) => b.x), busL = Math.min(...xs), busR = Math.max(...xs);
    if (busR > busL) drawWire(busL, outY, busR, outY, outCol, true);
    drawWire(busR, outY, outX - 24, outY, outCol, true);
    boxes.forEach((b) => dot(b.x, outY, 4, outCol, S.vout > 0.5 ? 6 : 0));
    dot(busR, outY, 5, outCol, S.vout > 0.5 ? 8 : 0);

    // output level lamp
    const lampOn = S.vout > 0.5;
    ctx.save();
    if (lampOn) { ctx.shadowColor = C.sin; ctx.shadowBlur = 22; }
    ctx.fillStyle = mix(C.panel2, C.sin, S.vout); ctx.strokeStyle = lampOn ? C.sin : C.muted; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(outX, outY, 22, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    label(lampOn ? "1" : "0", outX, outY, lampOn ? C.aink : C.muted, 20);
    label("OUT", outX, outY + 38, outCol, 12);

    // gate connections (input letter + PMOS bubble on each transistor)
    boxes.forEach(drawGate);
  }

  function updateStatus() {
    const el = $("status"), hi = S.vout > 0.5;
    el.textContent = "OUT = " + (hi ? "1" : "0");
    el.classList.toggle("hi", hi);
  }

  let last = performance.now();
  function frame(now) { const dt = (now - last) / 1000; last = now; step(dt); draw(); updateStatus(); requestAnimationFrame(frame); }

  // ---- input toggles (data-driven from gate().inputs) ----
  function buildInputs() {
    const host = $("inputs"); host.innerHTML = "";
    gate().inputs.forEach((name, i) => {
      const b = document.createElement("button");
      b.className = "switch"; b.dataset.i = String(i);
      b.innerHTML = '<span class="name">' + name + '</span>'
        + '<span class="track"><span class="thumb"></span></span>'
        + '<span class="val">0</span>';
      b.onclick = () => { S.inputs[i] = S.inputs[i] ? 0 : 1; syncInputs(); };
      host.appendChild(b);
    });
    syncInputs();
  }
  function syncInputs() {
    const kids = $("inputs").children;
    for (let i = 0; i < kids.length; i++) {
      const on = S.inputs[i] === 1;
      kids[i].classList.toggle("on", on);
      kids[i].querySelector(".val").textContent = on ? "1" : "0";
    }
  }

  function selectGate(name) {
    current = name;
    S.inputs = gate().inputs.map(() => 0);
    S.vin = gate().inputs.map(() => 0);
    S.vout = gateOutput();
    buildInputs();
    $("eyebrow").textContent = "CMOS — " + name;
    [...$("seg").children].forEach((b) => b.classList.toggle("on", b.dataset.gate === name));
    last = performance.now();
  }

  [...$("seg").children].forEach((b) => { b.onclick = () => selectGate(b.dataset.gate); });
  $("reset-btn").onclick = () => { for (let i = 0; i < S.inputs.length; i++) S.inputs[i] = 0; syncInputs(); last = performance.now(); };

  new ResizeObserver(fit).observe(cv);
  window.addEventListener("resize", fit);
  fit(); selectGate("NOT"); requestAnimationFrame(frame);
})();
</script>
