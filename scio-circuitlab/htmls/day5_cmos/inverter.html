<title>CMOS Inverter — two switches</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --ok: #1f9d57;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c; --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
  }
  :root[data-theme="light"] {
    --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff; --ok: #1f9d57;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding: clamp(14px, 2.4vw, 34px); -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .26em; text-transform: uppercase; color: var(--muted); }
  .pill { font-family: var(--mono); font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--panel-2); }
  .pill.hi { color: var(--accent-ink); background: var(--sig-in); border-color: transparent; }

  .stage { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  canvas { display: block; width: 100%; height: clamp(400px, 60vw, 560px); }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 16px 26px; padding: 2px; }
  .btn { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 10px 18px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 9px; }
  .btn:hover { border-color: var(--accent); }
  .btn .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
  .btn.hi .dot { background: var(--sig-in); box-shadow: 0 0 9px var(--sig-in); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 600; }

  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="bar">
      <span class="eyebrow">CMOS inverter — preview</span>
      <span class="pill" id="status">OUT = 1</span>
    </div>

    <div class="stage"><canvas id="scene" aria-label="A CMOS inverter: a PMOS switch to the high rail and an NMOS switch to ground, both driven by the input; the output is the opposite of the input"></canvas></div>

    <div class="deck">
      <button class="btn primary" id="in-btn">Set input HIGH</button>
      <button class="btn" id="play-btn">Pause</button>
      <button class="btn" id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const motionScale = reduceMotion ? 0.4 : 1;
  const cssv = getComputedStyle(document.documentElement);
  const mono = cssv.getPropertyValue("--mono");

  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"),
      border: g("--border"), sin: g("--sig-in"), sc: g("--sig-c"), sr: g("--sig-r"),
      accent: g("--accent"), aink: g("--accent-ink"), ok: g("--ok"), bg: g("--bg"), panel: g("--panel") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  // input is a clean 0/1; vin/vout ease for smooth switching. Output = NOT input.
  const S = { input: 0, vin: 0, vout: 1, running: true, t: 0, flow: 0 };

  const cv = $("scene");
  let ctx, W, H, DPR, g = {};

  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx = cv.getContext("2d"); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    const cx = W * 0.45;
    const boxW = clamp(W * 0.17, 120, 210), boxH = clamp(H * 0.15, 74, 108);
    g = {
      cx, boxW, boxH,
      vddY: H * 0.13, gndY: H * 0.87,
      pmosY: H * 0.31, nmosY: H * 0.69, outY: H * 0.5,
      railL: W * 0.24, railR: W * 0.66,
      gateBusX: cx - boxW / 2 - clamp(W * 0.07, 48, 90),
      inX: W * 0.1, outX: W * 0.8,
      dotR: clamp(W * 0.008, 4, 6),
    };
  }

  function step(dt) {
    if (!S.running) return;
    dt = Math.min(dt, 0.05); S.t += dt;
    const e = 1 - Math.pow(0.004, dt);
    S.vin += (S.input - S.vin) * e;
    S.vout += ((1 - S.input) - S.vout) * e;   // inverter
    if (switching()) S.flow += dt * 1.6 * motionScale;
  }
  const outTarget = () => 1 - S.input;
  const switching = () => Math.abs(S.vout - outTarget()) > 0.015;
  const pmosOn = () => S.input === 0;   // gate low → PMOS conducts
  const nmosOn = () => S.input === 1;   // gate high → NMOS conducts

  // ---- drawing ----
  const mix = (a, b, t) => {
    t = clamp(t, 0, 1);
    const p = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
    const pa = p(a.length === 7 ? a : "#888888"), pb = p(b.length === 7 ? b : "#888888");
    return `rgb(${Math.round(lerp(pa[0], pb[0], t))},${Math.round(lerp(pa[1], pb[1], t))},${Math.round(lerp(pa[2], pb[2], t))})`;
  };
  const line = (x1, y1, x2, y2, col, w) => { ctx.strokeStyle = col; ctx.lineWidth = w || 3; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); };
  const label = (txt, x, y, col, size, align) => {
    ctx.fillStyle = col; ctx.font = "600 " + (size || 12) + "px " + mono;
    ctx.textAlign = align || "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, x, y);
  };
  function flowDots(ax, ay, bx, by, n, col) {
    const len = Math.hypot(bx - ax, by - ay);
    for (let i = 0; i < n; i++) {
      const f = (((i / n + S.flow) % 1) + 1) % 1;
      const x = lerp(ax, bx, f), y = lerp(ay, by, f);
      ctx.fillStyle = col; ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(x, y, 4.4, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    void len;
  }

  function drawFet(cy, kind, on) {
    const { cx, boxW, boxH } = g;
    const x0 = cx - boxW / 2, top = cy - boxH / 2, bot = cy + boxH / 2;
    // body
    ctx.fillStyle = C.panel2; ctx.globalAlpha = 0.6; ctx.fillRect(x0, top, boxW, boxH); ctx.globalAlpha = 1;
    ctx.strokeStyle = on ? C.ok : C.border; ctx.lineWidth = on ? 2.2 : 1.4;
    if (on) { ctx.save(); ctx.shadowColor = C.ok; ctx.shadowBlur = 14; ctx.strokeRect(x0, top, boxW, boxH); ctx.restore(); }
    else ctx.strokeRect(x0, top, boxW, boxH);

    // the switch: closed (conducting) or an open gap
    if (on) {
      line(cx, top, cx, bot, C.ok, 4);
      const carr = kind === "n" ? C.sc : C.sr;   // callback: NMOS = electron channel, PMOS = hole channel
      for (let i = 0; i < 4; i++) {
        const y = lerp(top + 12, bot - 12, i / 3);
        if (kind === "n") { ctx.fillStyle = carr; ctx.beginPath(); ctx.arc(cx, y, g.dotR - 1, 0, 7); ctx.fill(); }
        else { ctx.strokeStyle = carr; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, y, g.dotR - 1, 0, 7); ctx.stroke(); }
      }
    } else {
      line(cx, top, cx, cy - 16, C.muted, 3);
      line(cx, cy + 16, cx, bot, C.muted, 3);
      ctx.strokeStyle = C.muted; ctx.globalAlpha = 0.5; ctx.lineWidth = 2;   // open-switch hint
      ctx.beginPath(); ctx.arc(cx, cy - 12, 3, 0, 7); ctx.moveTo(cx + 14, cy + 12); ctx.lineTo(cx, cy - 8); ctx.stroke(); ctx.globalAlpha = 1;
    }

    label(kind === "n" ? "NMOS" : "PMOS", x0 - 10, cy, C.muted, 12, "right");
    label(on ? "ON" : "OFF", cx + boxW / 2 + 10, cy, on ? C.ok : C.muted, 12, "left");
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const { cx, boxW, boxH, vddY, gndY, pmosY, nmosY, outY, railL, railR, gateBusX, inX, outX } = g;
    const pOn = pmosOn(), nOn = nmosOn();
    const outCol = mix(C.muted, C.sin, S.vout);
    const pTop = pmosY - boxH / 2, pBot = pmosY + boxH / 2, nTop = nmosY - boxH / 2, nBot = nmosY + boxH / 2;

    // rails
    line(railL, vddY, railR, vddY, C.sin, 3);
    label("VDD  = 1", railR + 8, vddY, C.sin, 12, "left");
    line(railL, gndY, railR, gndY, C.muted, 3);
    label("GND = 0", railR + 8, gndY, C.muted, 12, "left");

    // spine wires: VDD→PMOS (always high), PMOS→out→NMOS (the output net), NMOS→GND (always low)
    line(cx, vddY, cx, pTop, C.sin, 3);
    line(cx, pBot, cx, nTop, outCol, 3);
    line(cx, nBot, cx, gndY, C.muted, 3);

    // output tap
    line(cx, outY, outX - 24, outY, outCol, 3);

    // transistors
    drawFet(pmosY, "p", pOn);
    drawFet(nmosY, "n", nOn);

    // output node + level lamp
    ctx.fillStyle = outCol; ctx.beginPath(); ctx.arc(cx, outY, 5, 0, 7); ctx.fill();
    const lampOn = S.vout > 0.5, lx = outX, ly = outY;
    ctx.save();
    if (lampOn) { ctx.shadowColor = C.sin; ctx.shadowBlur = 22; }
    ctx.fillStyle = mix(C.panel2, C.sin, S.vout); ctx.strokeStyle = lampOn ? C.sin : C.muted; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(lx, ly, 22, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    label(S.vout > 0.5 ? "1" : "0", lx, ly, lampOn ? C.aink : C.muted, 20);
    label("OUT", lx, ly + 38, outCol, 12);

    // input node + gate wiring (both gates tied to the input)
    const inCol = mix(C.muted, C.sin, S.vin);
    line(inX + 20, outY, gateBusX, outY, inCol, 3);          // input → gate bus
    line(gateBusX, pmosY, gateBusX, nmosY, inCol, 3);         // vertical gate bus
    line(gateBusX, pmosY, cx - boxW / 2 - 8, pmosY, inCol, 3); // → PMOS gate (bubble)
    line(gateBusX, nmosY, cx - boxW / 2, nmosY, inCol, 3);     // → NMOS gate
    ctx.fillStyle = C.panel; ctx.strokeStyle = inCol; ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.arc(cx - boxW / 2 - 4, pmosY, 4.5, 0, 7); ctx.fill(); ctx.stroke();  // PMOS active-low bubble
    // input lamp
    ctx.save(); if (S.vin > 0.5) { ctx.shadowColor = C.sin; ctx.shadowBlur = 18; }
    ctx.fillStyle = mix(C.panel2, C.sin, S.vin); ctx.strokeStyle = S.vin > 0.5 ? C.sin : C.muted; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(inX, outY, 20, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    label(S.input ? "1" : "0", inX, outY, S.vin > 0.5 ? C.aink : C.muted, 18);
    label("IN", inX, outY + 36, inCol, 12);

    // charge flowing to (dis)charge the output — only while switching
    if (switching()) {
      if (pOn) flowDots(cx, pBot, cx, outY, 4, C.sin);        // pull output up toward VDD
      if (nOn) flowDots(cx, outY, cx, nBot, 4, C.muted);      // pull output down toward GND
    }

    // one quiet caption for the payoff
    const cap = switching() ? "switching — charge flows to flip the output"
      : "settled — one switch holds the output, the path VDD→GND stays blocked";
    label(cap, W / 2, H * 0.955, C.muted, 11);
  }

  function updateStatus() {
    const el = $("status"), hi = S.vout > 0.5;
    el.textContent = "OUT = " + (hi ? "1" : "0");
    el.classList.toggle("hi", hi);
  }

  let last = performance.now();
  function frame(now) { const dt = (now - last) / 1000; last = now; step(dt); draw(); updateStatus(); requestAnimationFrame(frame); }

  function setInput(v) {
    S.input = v;
    $("in-btn").classList.toggle("hi", v === 1);
    $("in-btn").textContent = v === 1 ? "Set input LOW" : "Set input HIGH";
  }
  $("in-btn").onclick = () => setInput(S.input ? 0 : 1);
  $("play-btn").onclick = () => { S.running = !S.running; $("play-btn").textContent = S.running ? "Pause" : "Play"; last = performance.now(); };
  $("reset-btn").onclick = () => { setInput(0); S.vin = 0; S.vout = 1; S.running = true; $("play-btn").textContent = "Pause"; last = performance.now(); };

  new ResizeObserver(fit).observe(cv);
  window.addEventListener("resize", fit);
  fit(); setInput(0); requestAnimationFrame(frame);
})();
</script>
