<title>Compound gates — built from blocks</title>
<style>
  :root {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c;
    --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
      --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
      --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff;
      --ok: #1f9d57;
      --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0c1116; --panel: #131c22; --panel-2: #0f171c; --border: #24323b;
    --ink: #e6edf1; --muted: #8a9ba6; --grid: #1d2a32;
    --sig-in: #e3b341; --sig-c: #3fc5e6; --sig-r: #f07649; --accent: #3fc5e6; --accent-ink: #04222c; --ok: #5fd08a;
    --shadow: 0 1px 0 rgba(255,255,255,.03), 0 12px 34px -20px rgba(0,0,0,.85);
  }
  :root[data-theme="light"] {
    --bg: #e9eef1; --panel: #ffffff; --panel-2: #f3f6f8; --border: #d3dde2;
    --ink: #17242c; --muted: #5b6b74; --grid: #e3eaee;
    --sig-in: #b9821f; --sig-c: #1298bf; --sig-r: #d85a2c; --accent: #1298bf; --accent-ink: #ffffff; --ok: #1f9d57;
    --shadow: 0 1px 0 rgba(255,255,255,.6), 0 14px 30px -22px rgba(20,40,55,.5);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; padding: clamp(14px, 2.4vw, 34px); -webkit-font-smoothing: antialiased; }
  .shell { max-width: 1040px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .26em; text-transform: uppercase; color: var(--muted); }
  .bar-right { display: flex; align-items: center; gap: 12px; }
  .pill { font-family: var(--mono); font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--panel-2); }
  .pill.hi { color: var(--accent-ink); background: var(--sig-in); border-color: transparent; }
  .icon-btn { font-family: var(--mono); font-size: .95rem; line-height: 1; color: var(--muted); background: var(--panel-2); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; }
  .icon-btn:hover { border-color: var(--accent); color: var(--ink); }

  /* segmented control — picks which compound gate to build */
  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 11px; padding: 3px; gap: 2px; }
  .seg button { font-family: var(--mono); font-size: .82rem; letter-spacing: .08em; color: var(--muted); background: transparent; border: 0; padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  .seg button:hover { color: var(--ink); }
  .seg button.on { color: var(--accent-ink); background: var(--accent); }

  .stage { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  canvas { display: block; width: 100%; height: clamp(400px, 56vw, 540px); }

  .deck { display: flex; flex-wrap: wrap; align-items: center; gap: 16px 26px; padding: 2px; }
  .btn { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 10px 18px; border-radius: 9px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }

  /* one toggle per input, so the row scales with the gate's input count */
  .inputs { display: flex; flex-wrap: wrap; gap: 12px; }
  .switch { font-family: var(--mono); font-size: .82rem; letter-spacing: .04em; color: var(--ink); background: var(--panel); border: 1px solid var(--border); padding: 8px 12px 8px 14px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 11px; }
  .switch:hover { border-color: var(--accent); }
  .switch .name { font-weight: 600; color: var(--muted); }
  .switch.on .name { color: var(--sig-in); }
  .switch .track { width: 34px; height: 18px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); position: relative; transition: background .15s, border-color .15s; }
  .switch .thumb { position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; border-radius: 50%; background: var(--muted); transition: left .15s, background .15s; }
  .switch.on .track { background: var(--sig-in); border-color: transparent; }
  .switch.on .thumb { left: 17px; background: var(--accent-ink); }
  .switch .val { min-width: 1ch; text-align: center; color: var(--muted); }
  .switch.on .val { color: var(--sig-in); }

  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="wrap">
  <div class="shell">
    <div class="bar">
      <span class="eyebrow">Gates built from blocks</span>
      <div class="bar-right">
        <div class="seg" id="seg"></div>
        <span class="pill" id="status">OUT = 0</span>
        <button class="icon-btn" id="theme-btn" title="Toggle light / dark">◐</button>
      </div>
    </div>

    <div class="stage"><canvas id="scene" aria-label="A compound logic gate drawn as a network of simpler gate blocks wired between the input lamps and the output lamp."></canvas></div>

    <div class="deck">
      <div class="inputs" id="inputs"></div>
      <button class="btn" id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const cssv = getComputedStyle(document.documentElement);
  const mono = cssv.getPropertyValue("--mono");

  let C = {};
  function refreshColors() {
    const c = getComputedStyle(document.documentElement), g = (n) => c.getPropertyValue(n).trim();
    C = { ink: g("--ink"), muted: g("--muted"), grid: g("--grid"), panel2: g("--panel-2"),
      border: g("--border"), sin: g("--sig-in"), accent: g("--accent"), aink: g("--accent-ink"),
      ok: g("--ok"), bg: g("--bg"), panel: g("--panel") };
  }
  refreshColors();
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", refreshColors);
  new MutationObserver(refreshColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  // ---- the gate library ----------------------------------------------------
  // Each compound gate is a netlist: an ordered list of nodes, each wired to
  // "A"/"B" or to an earlier node id. The LAST node is the output. Nothing here
  // knows the answer — the output falls out of evaluating the wiring below.
  const gateDefs = {
    AND: { inputs: ["A", "B"], nodes: [
      { id: "n1", type: "NAND", inputs: ["A", "B"] },
      { id: "out", type: "NOT", inputs: ["n1"] },
    ] },
    OR: { inputs: ["A", "B"], nodes: [
      { id: "n1", type: "NOR", inputs: ["A", "B"] },
      { id: "out", type: "NOT", inputs: ["n1"] },
    ] },
    // XOR = (A and not-B) or (not-A and B) = "exactly one input is high"
    XOR: { inputs: ["A", "B"], nodes: [
      { id: "nA", type: "NOT", inputs: ["A"] },
      { id: "nB", type: "NOT", inputs: ["B"] },
      { id: "t1", type: "AND", inputs: ["A", "nB"] },
      { id: "t2", type: "AND", inputs: ["nA", "B"] },
      { id: "out", type: "OR", inputs: ["t1", "t2"] },
    ] },
    // XNOR = XOR followed by an inverter
    XNOR: { inputs: ["A", "B"], nodes: [
      { id: "nA", type: "NOT", inputs: ["A"] },
      { id: "nB", type: "NOT", inputs: ["B"] },
      { id: "t1", type: "AND", inputs: ["A", "nB"] },
      { id: "t2", type: "AND", inputs: ["nA", "B"] },
      { id: "xor", type: "OR", inputs: ["t1", "t2"] },
      { id: "out", type: "NOT", inputs: ["xor"] },
    ] },
  };

  // per-block truth tables — the only place a block's behaviour is defined
  const truth = {
    NOT: (v) => (v[0] ? 0 : 1),
    NAND: (v) => (v[0] && v[1] ? 0 : 1),
    NOR: (v) => (v[0] || v[1] ? 0 : 1),
    AND: (v) => (v[0] && v[1] ? 1 : 0),
    OR: (v) => (v[0] || v[1] ? 1 : 0),
  };
  const inverting = (type) => type === "NOT" || type === "NAND" || type === "NOR";

  // hand-tune a block after auto-layout, keyed by node id, e.g. tune.XOR = { t1: { dy: -12 } }
  const tune = {};

  // ---- evaluation ----------------------------------------------------------
  // Walk the nodes in order, resolving each block's inputs to values already
  // computed, so the displayed output emerges from the network, not a formula.
  function evaluate(def, a, b) {
    const val = { A: a, B: b };
    for (const n of def.nodes) val[n.id] = truth[n.type](n.inputs.map((r) => val[r]));
    return val;
  }

  // ---- build the drawable tree --------------------------------------------
  // Expand the netlist into a tree rooted at the output. Every reference to an
  // input becomes its own leaf cell, so a shared input (A, B) simply appears in
  // more than one place — which keeps every wire in its own branch and removes
  // the crossings you'd get from fanning one lamp out across the whole diagram.
  function buildCells(def) {
    let counter = 0;
    const make = (ref) => {
      if (ref === "A" || ref === "B") return { cid: counter++, kind: "leaf", letter: ref };
      const node = def.nodes.find((n) => n.id === ref);
      return { cid: counter++, kind: "gate", nodeId: node.id, type: node.type, children: node.inputs.map(make) };
    };
    const root = make(def.nodes[def.nodes.length - 1].id);
    const cells = [];
    (function walk(c) { if (c.children) c.children.forEach(walk); cells.push(c); })(root);   // children before parents
    return { root, cells };
  }

  // column = depth from the leaves; slot = tree layout (leaves take successive
  // rows top-to-bottom, each gate sits at the average row of its children).
  function assignGrid(root) {
    (function col(c) {
      c.col = c.kind === "leaf" ? 0 : 1 + Math.max(...c.children.map(col));
      return c.col;
    })(root);
    let slot = 0;
    (function place(c) {
      if (c.kind === "leaf") { c.slot = slot++; return; }
      c.children.forEach(place);
      c.slot = c.children.reduce((s, k) => s + k.slot, 0) / c.children.length;
    })(root);
  }

  // ---- state ---------------------------------------------------------------
  let net, gateName = "AND";
  const inputs = [0, 0];       // clean 0/1 bits for A, B
  const disp = {};             // eased display value per cell (for smooth glow)
  let logic = {};              // current true value per netlist node, per frame

  const bitOf = (c) => (c.kind === "leaf" ? inputs[c.letter === "A" ? 0 : 1] : logic[c.nodeId]);

  function buildNet(name) {
    gateName = name;
    const def = gateDefs[name];
    const { root, cells } = buildCells(def);
    assignGrid(root);
    net = {
      name, def, root, cells,
      leaves: cells.filter((c) => c.kind === "leaf"),
      maxCol: root.col,
      slots: Math.max(...cells.map((c) => c.slot)),
      outId: def.nodes[def.nodes.length - 1].id,
    };
    logic = evaluate(def, inputs[0], inputs[1]);
    for (const c of cells) disp[c.cid] = bitOf(c);    // snap on rebuild — no ripple on gate change
    if (W) computeLayout();
  }

  // ---- canvas + sizing ----
  const cv = $("scene");
  let ctx, W, H, DPR;
  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx = cv.getContext("2d"); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    computeLayout();
  }

  function computeLayout() {
    const xIn = W * 0.08, xRight = W * 0.78, midY = H * 0.5;
    const colX = (c) => (net.maxCol === 0 ? xIn : lerp(xIn, xRight, c / net.maxCol));
    const rowGap = Math.min(clamp(H * 0.26, 80, 150), (H * 0.8) / Math.max(1, net.slots));
    for (const c of net.cells) {
      c.x = colX(c.col);
      c.y = midY + (c.slot - net.slots / 2) * rowGap;
    }
    // per-gate hand-tune offsets
    const t = tune[net.name] || {};
    for (const c of net.cells) if (c.kind === "gate" && t[c.nodeId]) { c.x += t[c.nodeId].dx || 0; c.y += t[c.nodeId].dy || 0; }

    net.outLamp = { x: W * 0.9, y: net.root.y };
    const gapX = (net.maxCol >= 1 ? colX(1) - xIn : W * 0.2);
    net.bw = clamp(Math.min(W * 0.075, gapX * 0.5), 52, 90);
    net.bh = clamp(Math.min(H * 0.12, rowGap * 0.62), 44, 76);
    net.br = clamp(net.bh * 0.15, 5, 8);                                   // inversion-bubble radius
    net.lampR = clamp(Math.min(W * 0.028, rowGap * 0.42), 15, 24);
  }

  // values propagate left-to-right: a block only starts easing once its inputs
  // have settled, so a toggled input visibly ripples through the network.
  function step(dt) {
    dt = Math.min(dt, 0.05);
    const e = 1 - Math.pow(0.012, dt);
    logic = evaluate(net.def, inputs[0], inputs[1]);
    for (const c of net.cells) {                       // cells are children-before-parents, so cascades settle in order
      if (c.kind === "leaf") { disp[c.cid] += (bitOf(c) - disp[c.cid]) * e; continue; }
      const ready = c.children.every((k) => Math.abs(disp[k.cid] - bitOf(k)) < 0.12);
      if (ready) disp[c.cid] += (bitOf(c) - disp[c.cid]) * e;
    }
  }

  // ---- drawing helpers ----
  const mix = (a, b, t) => {
    t = clamp(t, 0, 1);
    const p = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
    const pa = p(a.length === 7 ? a : "#888888"), pb = p(b.length === 7 ? b : "#888888");
    return `rgb(${Math.round(lerp(pa[0], pb[0], t))},${Math.round(lerp(pa[1], pb[1], t))},${Math.round(lerp(pa[2], pb[2], t))})`;
  };
  const hot = (v) => mix(C.muted, C.sin, v);       // wire/label colour for a value
  const label = (txt, x, y, col, size) => {
    ctx.fillStyle = col; ctx.font = "600 " + (size || 12) + "px " + mono;
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(txt, x, y);
  };
  const dot = (x, y, r, col, glow) => {
    ctx.save(); if (glow) { ctx.shadowColor = col; ctx.shadowBlur = glow; }
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.restore();
  };

  // ports: where a wire leaves a source (right) and enters a gate (left)
  function portOut(c) {
    if (c.kind === "leaf") return { x: c.x + net.lampR, y: c.y };
    return { x: c.x + net.bw / 2 + (inverting(c.type) ? net.br * 2 : 0), y: c.y };
  }
  function portIn(c, k) {
    const x0 = c.x - net.bw / 2;
    if (c.children.length === 1) return { x: x0, y: c.y };
    return { x: x0, y: c.y + (k === 0 ? -1 : 1) * net.bh * 0.24 };
  }

  // orthogonal wire (out → mid → in), coloured and lit by the value it carries
  function drawWire(s, e, v) {
    const col = hot(v), midX = (s.x + e.x) / 2;
    ctx.save();
    ctx.globalAlpha = lerp(0.5, 1, v);
    ctx.shadowColor = col; ctx.shadowBlur = lerp(0, 12, v);
    ctx.strokeStyle = col; ctx.lineWidth = lerp(2.2, 3.8, v); ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(s.x, s.y); ctx.lineTo(midX, s.y); ctx.lineTo(midX, e.y); ctx.lineTo(e.x, e.y);
    ctx.stroke();
    ctx.restore();
  }

  // distinctive gate silhouettes, nose pointing right; bubble drawn when inverting
  function gatePath(type, x0, cy, bw, bh) {
    const r = bh / 2;
    ctx.beginPath();
    if (type === "NOT") {
      ctx.moveTo(x0, cy - r); ctx.lineTo(x0 + bw, cy); ctx.lineTo(x0, cy + r); ctx.closePath();
    } else if (type === "OR" || type === "NOR") {
      ctx.moveTo(x0, cy - r);
      ctx.quadraticCurveTo(x0 + bw * 0.62, cy - r, x0 + bw, cy);
      ctx.quadraticCurveTo(x0 + bw * 0.62, cy + r, x0, cy + r);
      ctx.quadraticCurveTo(x0 + bw * 0.3, cy, x0, cy - r);
      ctx.closePath();
    } else { // AND / NAND — flat back, semicircular nose
      ctx.moveTo(x0, cy - r);
      ctx.lineTo(x0 + bw - r, cy - r);
      ctx.arc(x0 + bw - r, cy, r, -Math.PI / 2, Math.PI / 2);
      ctx.lineTo(x0, cy + r);
      ctx.closePath();
    }
  }

  function drawBlock(c) {
    const v = disp[c.cid], { bw, bh, br } = net, x0 = c.x - bw / 2, hi = v > 0.5, edge = hi ? C.sin : C.border;
    ctx.save();
    gatePath(c.type, x0, c.y, bw, bh);
    ctx.fillStyle = mix(C.panel2, C.sin, v * 0.22); ctx.fill();
    if (hi) { ctx.shadowColor = C.sin; ctx.shadowBlur = 14; }
    ctx.strokeStyle = edge; ctx.lineWidth = hi ? 2.4 : 1.5; ctx.lineJoin = "round"; ctx.stroke();
    ctx.restore();
    // inversion bubble sits on the nose of NOT / NAND / NOR
    if (inverting(c.type)) {
      const bx = x0 + bw + br;
      ctx.save(); ctx.fillStyle = C.panel; ctx.strokeStyle = edge; ctx.lineWidth = hi ? 2.2 : 1.5;
      ctx.beginPath(); ctx.arc(bx, c.y, br, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    }
    const lx = c.type === "NOT" ? x0 + bw * 0.34 : x0 + bw * 0.44;
    label(c.type, lx, c.y, C.ink, clamp(bh * 0.22, 9, 12));
  }

  function drawLamp(x, y, valBit, dispVal, text) {
    const r = net.lampR, on = dispVal > 0.5;
    ctx.save();
    if (on) { ctx.shadowColor = C.sin; ctx.shadowBlur = 20; }
    ctx.fillStyle = mix(C.panel2, C.sin, dispVal); ctx.strokeStyle = on ? C.sin : C.muted; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.stroke(); ctx.restore();
    label(valBit ? "1" : "0", x, y, on ? C.aink : C.muted, r * 0.85);
    label(text, x, y + r + 15, hot(dispVal), 12);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // wires first, under the blocks
    for (const c of net.cells) {
      if (c.kind !== "gate") continue;
      c.children.forEach((k, i) => drawWire(portOut(k), portIn(c, i), disp[k.cid]));
    }
    drawWire(portOut(net.root), { x: net.outLamp.x - net.lampR, y: net.outLamp.y }, disp[net.root.cid]);

    // solder dot where each source wire leaves its block (helps fan-outs read)
    for (const c of net.cells) { const q = portOut(c); dot(q.x, q.y, 3.5, hot(disp[c.cid]), disp[c.cid] > 0.5 ? 8 : 0); }

    for (const c of net.cells) if (c.kind === "gate") drawBlock(c);
    for (const c of net.leaves) drawLamp(c.x, c.y, bitOf(c), disp[c.cid], c.letter);
    drawLamp(net.outLamp.x, net.outLamp.y, logic[net.outId], disp[net.root.cid], "OUT");
  }

  function updateStatus() {
    const el = $("status"), hi = logic[net.outId] === 1;
    el.textContent = "OUT = " + (hi ? "1" : "0");
    el.classList.toggle("hi", hi);
  }

  let last = performance.now();
  function frame(now) { const dt = (now - last) / 1000; last = now; step(dt); draw(); updateStatus(); requestAnimationFrame(frame); }

  // ---- controls ----
  function buildSeg() {
    const host = $("seg"); host.innerHTML = "";
    Object.keys(gateDefs).forEach((name) => {
      const b = document.createElement("button");
      b.textContent = name; b.dataset.name = name;
      b.classList.toggle("on", name === gateName);
      b.onclick = () => { buildNet(name); syncSeg(); buildInputs(); };
      host.appendChild(b);
    });
  }
  function syncSeg() {
    for (const b of $("seg").children) b.classList.toggle("on", b.dataset.name === gateName);
  }

  function buildInputs() {
    const host = $("inputs"); host.innerHTML = "";
    net.def.inputs.forEach((name, i) => {
      const b = document.createElement("button");
      b.className = "switch"; b.dataset.i = String(i);
      b.innerHTML = '<span class="name">' + name + '</span>'
        + '<span class="track"><span class="thumb"></span></span>'
        + '<span class="val">0</span>';
      b.onclick = () => { inputs[i] = inputs[i] ? 0 : 1; syncInputs(); };
      host.appendChild(b);
    });
    syncInputs();
  }
  function syncInputs() {
    const kids = $("inputs").children;
    for (let i = 0; i < kids.length; i++) {
      const on = inputs[i] === 1;
      kids[i].classList.toggle("on", on);
      kids[i].querySelector(".val").textContent = on ? "1" : "0";
    }
  }

  $("reset-btn").onclick = () => { inputs[0] = 0; inputs[1] = 0; syncInputs(); };
  $("theme-btn").onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme")
      || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
